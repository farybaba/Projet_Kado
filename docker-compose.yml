version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kado_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kado
      POSTGRES_PASSWORD: kado_dev_password
      POSTGRES_DB: kado
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kado -d kado']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kado_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass kado_redis_password
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'kado_redis_password', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: kado_network
